name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: sloughgpt-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.10"
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/sloughgpt

jobs:
  ci-core:
    uses: ./.github/workflows/reusable-ci-core.yml
    with:
      upload_test_artifact: ${{ github.event_name != 'pull_request' }}

  test-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt
            apps/api/server/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch torchvision torchaudio
          python -m pip install transformers fastapi uvicorn pydantic httpx numpy pytest
          python -m pip install -e .

      - name: Run tests
        run: |
          export DYLD_INSERT_LIBRARIES=""
          python -m pytest tests/test_quantization.py tests/test_optimizations.py tests/test_benchmarking.py tests/test_checkpoint_utils.py tests/test_config.py tests/test_train_sloughgpt_generate_text.py tests/test_train_sloughgpt_resume.py tests/test_sloughgpt_trainer_smoke.py tests/test_sloughgpt_trainer_resume.py tests/test_sloughgpt_trainer_progress_callback.py tests/test_cli_train_export_stem.py tests/test_cli_train_api_payload.py tests/test_training_router_kwds.py tests/test_training_schemas.py tests/test_lm_eval_char.py tests/test_cli_local_soul_candidates.py tests/test_soul_engine_conversation.py tests/test_sloughgpt_colab_notebook.py -v --tb=short

      - name: train_sloughgpt.py CLI smoke (macOS)
        run: python3 train_sloughgpt.py --help

  test-sdk-ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: packages/sdk-ts/typescript-sdk/package.json

      - name: Install dependencies
        working-directory: packages/sdk-ts/typescript-sdk
        run: npm ci

      - name: Lint, build, test
        working-directory: packages/sdk-ts/typescript-sdk
        run: npm run ci

  test-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: apps/web/package.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Lint
        working-directory: apps/web
        run: npm run lint

      - name: Typecheck
        working-directory: apps/web
        run: npm run typecheck

      - name: Unit tests (web)
        working-directory: apps/web
        run: npm run test

      - name: Build
        working-directory: apps/web
        run: npm run build

      - name: E2E (Cypress, mocked API)
        working-directory: apps/web
        run: npm run e2e:ci

  sdk-test-py:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt
            apps/api/server/requirements.txt

      - name: Install SDK dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests httpx pytest pytest-asyncio

      - name: Run Python SDK tests
        run: |
          cd packages/sdk-py/sloughgpt_sdk
          python -m pytest ../../../tests/test_sdk.py -v --tb=short

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt
            apps/api/server/requirements.txt

      - name: Check Python syntax (core domains)
        run: |
          python -m py_compile packages/core-py/domains/training/*.py 2>/dev/null || true
          python -m py_compile packages/core-py/domains/inference/*.py 2>/dev/null || true
          python -m py_compile packages/core-py/domains/ml_infrastructure/*.py 2>/dev/null || true

  standards-schemas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt
            apps/api/server/requirements.txt
      - name: Validate v1 example manifests against JSON Schema
        run: |
          python -m pip install --upgrade pip
          python -m pip install jsonschema
          python scripts/validate_standards_schemas.py

  build:
    runs-on: ubuntu-latest
    needs: [ci-core, test-sdk-ts, test-web, sdk-test-py, standards-schemas]
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile
          push: false
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Build dev image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.dev
          push: false
          tags: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:dev

  deploy:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'release'
    environment:
      name: production
      url: https://github.com/${{ github.repository }}/releases/tag/${{ github.event.release.tag_name }}
    steps:
      - name: Release build verified
        run: |
          echo "Image build jobs completed for release ${{ github.event.release.tag_name }}."
          echo "Publish packages via .github/workflows/publish.yml as needed."

  benchmark:
    runs-on: ubuntu-latest
    needs: [ci-core]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt
            apps/api/server/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install transformers numpy
          python -m pip install -e .

      - name: Run benchmarks
        run: |
          python scripts/tools/performance_test.py --test latency --runs 5 --tokens 20
