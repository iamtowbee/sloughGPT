name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
  release:
    types: [published]

env:
  PYTHON_VERSION: "3.10"
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/sloughgpt

jobs:
  # Lint and type check
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install lint tools
        run: |
          pip install --upgrade pip
          pip install ruff mypy
      
      - name: Run Ruff lint
        run: ruff check . --exit-non-zero || true

  # Unit tests
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install transformers fastapi uvicorn pydantic httpx numpy
          pip install pytest pytest-cov pytest-asyncio
          pip install -e .
      
      - name: Run tests
        run: |
          pytest tests/test_quantization.py tests/test_optimizations.py tests/test_benchmarking.py tests/test_inference.py -v --tb=short
      
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/

  # macOS tests (MPS)
  test-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch torchvision torchaudio
          pip install transformers fastapi uvicorn pydantic httpx numpy pytest
          pip install -e .
      
      - name: Run tests
        run: |
          export DYLD_INSERT_LIBRARIES=""
          pytest tests/test_quantization.py tests/test_optimizations.py tests/test_benchmarking.py -v --tb=short

  # TypeScript SDK tests
  test-sdk-ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/sdk-ts/typescript-sdk/package.json

      - name: Install dependencies
        working-directory: packages/sdk-ts/typescript-sdk
        run: npm ci

      - name: Type check
        working-directory: packages/sdk-ts/typescript-sdk
        run: npm run lint

      - name: Build
        working-directory: packages/sdk-ts/typescript-sdk
        run: npm run build

      - name: Test
        working-directory: packages/sdk-ts/typescript-sdk
        run: npm test

  # Build Docker images
  build:
    runs-on: ubuntu-latest
    needs: [lint, test, test-sdk-ts]
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build production image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
      
      - name: Build dev image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.dev
          push: false
          tags: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:dev

  # Deploy to production (on release)
  deploy:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'release'
    environment:
      name: production
      url: https://github.com/${{ github.repository }}/releases
    steps:
      - uses: actions/checkout@v4
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Benchmark (on main)
  benchmark:
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install transformers numpy
          pip install -e .
      
      - name: Run benchmarks
        run: |
          python performance_test.py --test latency --runs 5 --tokens 20
