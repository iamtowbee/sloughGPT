name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
  release:
    types: [published]

env:
  PYTHON_VERSION: "3.10"
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/sloughgpt

jobs:
  ci-core:
    uses: ./.github/workflows/reusable-ci-core.yml
    with:
      upload_test_artifact: true

  test-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch torchvision torchaudio
          python -m pip install transformers fastapi uvicorn pydantic httpx numpy pytest
          python -m pip install -e .

      - name: Run tests
        run: |
          export DYLD_INSERT_LIBRARIES=""
          python -m pytest tests/test_quantization.py tests/test_optimizations.py tests/test_benchmarking.py -v --tb=short

  test-sdk-ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/sdk-ts/typescript-sdk/package.json

      - name: Install dependencies
        working-directory: packages/sdk-ts/typescript-sdk
        run: npm ci

      - name: Type check
        working-directory: packages/sdk-ts/typescript-sdk
        run: npm run lint

      - name: Build
        working-directory: packages/sdk-ts/typescript-sdk
        run: npm run build

      - name: Test
        working-directory: packages/sdk-ts/typescript-sdk
        run: npm test

  build:
    runs-on: ubuntu-latest
    needs: [ci-core, test-sdk-ts]
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile
          push: false
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Build dev image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.dev
          push: false
          tags: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:dev

  deploy:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'release'
    environment:
      name: production
      url: https://github.com/${{ github.repository }}/releases
    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  benchmark:
    runs-on: ubuntu-latest
    needs: [ci-core]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install transformers numpy
          python -m pip install -e .

      - name: Run benchmarks
        run: |
          python performance_test.py --test latency --runs 5 --tokens 20
