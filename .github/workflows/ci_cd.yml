name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
  release:
    types: [published]

env:
  PYTHON_VERSION: "3.10"
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Lint and type check
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install lint tools
        run: pip install ruff mypy
      
      - name: Run Ruff lint
        run: ruff check . --exit-zero || true
      
      - name: Run mypy
        run: mypy domains/training --ignore-missing-imports --exit-zero || true

  # Unit tests
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      
      - name: Run tests
        run: pytest tests/ -v --cov=. --cov-report=xml
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml

  # Build Docker images
  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          tags: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:api
      
      - name: Build Model Server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: server/Dockerfile
          push: false
          tags: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:model-server

  # Deploy to production (on release)
  deploy:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to cloud
        run: |
          echo "Deploying release ${{ github.event.release.tag_name }}"
          # Add your deployment commands here
          # e.g., kubectl apply -f k8s/

  # Benchmark (on main)
  benchmark:
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: pip install torch pytest
      
      - name: Run benchmarks
        run: |
          python -c "
          import torch
          from domains.training.models.nanogpt import NanoGPT
          
          model = NanoGPT(vocab_size=1000, n_embed=256, n_layer=6, n_head=8, block_size=128)
          x = torch.randint(0, 1000, (2, 64))
          y = torch.randint(0, 1000, (2, 64))
          
          # Warmup
          for _ in range(3):
              logits, loss = model(x, y)
          
          import time
          start = time.time()
          for _ in range(10):
              logits, loss = model(x, y)
          elapsed = time.time() - start
          
          print(f'Forward pass: {elapsed/10*1000:.2f}ms')
          "
