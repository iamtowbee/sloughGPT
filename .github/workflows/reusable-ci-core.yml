# Shared lint + core pytest suite for CI and CI/CD workflows.
name: Reusable CI core

on:
  workflow_call:
    inputs:
      upload_test_artifact:
        description: Upload tests/ directory as a workflow artifact after pytest
        type: boolean
        default: false

env:
  PYTHON_VERSION: "3.10"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff

      - name: Run Ruff
        run: ruff check . --exit-non-zero

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install transformers fastapi uvicorn pydantic httpx numpy scipy psutil
          python -m pip install pytest pytest-cov pytest-asyncio
          python -m pip install -e .

      - name: Run core tests
        run: |
          python -m pytest tests/test_quantization.py tests/test_optimizations.py tests/test_benchmarking.py tests/test_inference.py tests/test_api.py tests/test_server_main_api.py tests/test_server_settings.py tests/test_security.py -v --tb=short --ignore=tests/test_core.py --ignore=tests/server/ --ignore=tests/cli/ --ignore=tests/web/ --ignore=tests/ml/

      - name: Upload test results
        if: ${{ inputs.upload_test_artifact && always() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/
