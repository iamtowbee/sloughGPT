name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest torch numpy
      
      - name: Check Ruff version
        run: ruff --version
      
      - name: Run Ruff lint
        run: ruff check . --exit-non-zero || true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install transformers fastapi uvicorn pydantic httpx numpy pytest pytest-asyncio
          pip install -e .
      
      - name: Run core tests
        run: |
          pytest tests/test_quantization.py tests/test_optimizations.py tests/test_benchmarking.py -v --tb=short

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      
      - name: Install dependencies
        run: pip install torch numpy
      
      - name: Check Python syntax
        run: |
          python -m py_compile domains/training/*.py 2>/dev/null || true
          python -m py_compile domains/inference/*.py 2>/dev/null || true
          python -m py_compile domains/ml_infrastructure/*.py 2>/dev/null || true
