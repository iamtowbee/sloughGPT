name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      
      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      
      - name: Run Ruff lint
        run: ruff check . --exit-non-zero || true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install transformers fastapi uvicorn pydantic httpx numpy scipy pytest pytest-asyncio pytest-cov
      
      - name: Run core tests only
        run: |
          pytest tests/test_quantization.py tests/test_optimizations.py tests/test_benchmarking.py tests/test_inference.py tests/test_api.py -v --tb=short --ignore=tests/test_core.py --ignore=tests/server/ --ignore=tests/cli/ --ignore=tests/web/ --ignore=tests/ml/

  sdk-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      
      - name: Install SDK dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests httpx pytest pytest-asyncio
      
      - name: Run SDK tests
        run: |
          cd sloughgpt_sdk
          pytest ../tests/test_sdk.py -v --tb=short

  security-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests
      
      - name: Run security tests
        run: |
          pytest tests/test_security.py -v --tb=short

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      
      - name: Check Python syntax
        run: |
          python -m py_compile domains/training/*.py 2>/dev/null || true
          python -m py_compile domains/inference/*.py 2>/dev/null || true
          python -m py_compile domains/ml_infrastructure/*.py 2>/dev/null || true

  standards-schemas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Validate v1 example manifests against JSON Schema
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema
          python scripts/validate_standards_schemas.py
