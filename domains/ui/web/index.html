<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SloughGPT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        header {
            background: #16213e;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #0f3460;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(90deg, #00d9ff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .controls {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        
        #personality-select {
            background: #0f3460;
            border: 1px solid #1a1a2e;
            color: #eee;
            padding: 0.5rem 1rem;
            border-radius: 4px;
        }
        
        select, input {
            background: #0f3460;
            border: 1px solid #1a1a2e;
            color: #eee;
            padding: 0.5rem 1rem;
            border-radius: 4px;
        }
        
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .message {
            max-width: 70%;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            line-height: 1.5;
        }
        
        .user-message {
            align-self: flex-end;
            background: #0f3460;
        }
        
        .assistant-message {
            align-self: flex-start;
            background: #16213e;
            border: 1px solid #0f3460;
        }
        
        .message-label {
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 0.5rem;
        }
        
        #input-container {
            background: #16213e;
            padding: 1rem 2rem;
            display: flex;
            gap: 1rem;
            border-top: 1px solid #0f3460;
        }
        
        #message-input {
            flex: 1;
            padding: 0.75rem 1rem;
            background: #0f3460;
            border: 1px solid #1a1a2e;
            color: #eee;
            border-radius: 8px;
            resize: none;
            font-family: inherit;
        }
        
        #send-btn {
            background: linear-gradient(90deg, #00d9ff, #a855f7);
            border: none;
            color: white;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }
        
        #send-btn:hover {
            transform: scale(1.05);
        }
        
        #send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .system-info {
            font-size: 0.8rem;
            color: #666;
            text-align: center;
            padding: 0.5rem;
        }
        
        .typing {
            display: flex;
            gap: 0.25rem;
            padding: 1rem;
        }
        
        .typing-text {
            min-height: 1.5em;
            animation: blink 0.5s infinite;
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.5; }
        }
        
        .typing span {
            width: 8px;
            height: 8px;
            background: #00d9ff;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        
        .typing span:nth-child(1) { animation-delay: -0.32s; }
        .typing span:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        .stats {
            display: flex;
            gap: 2rem;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">SloughGPT</div>
        <div class="controls">
            <select id="model-select">
                <option value="sloughgpt">SloughGPT (Local)</option>
                <option value="gpt2">GPT-2 (HuggingFace)</option>
            </select>
            <select id="personality-select">
                <option value="helpful">Helpful</option>
                <option value="creative">Creative</option>
                <option value="professional">Professional</option>
                <option value="casual">Casual</option>
                <option value="academic">Academic</option>
                <option value="sarcastic">Sarcastic</option>
            </select>
            <div class="stats">
                <span id="token-count">Tokens: 0</span>
                <span id="status">Ready</span>
            </div>
        </div>
    </header>
    
    <div id="chat-container">
        <div class="message assistant-message">
            <div class="message-label">SloughGPT</div>
            Hello! I'm SloughGPT, an AI assistant built with custom neural network infrastructure. How can I help you today?
        </div>
    </div>
    
    <div id="input-container">
        <textarea id="message-input" placeholder="Type your message..." rows="1"></textarea>
        <button id="send-btn">Send</button>
    </div>
    
    <div class="system-info">
        Running locally | CPU inference | Model: sloughgpt
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const modelSelect = document.getElementById('model-select');
        const personalitySelect = document.getElementById('personality-select');
        const tokenCount = document.getElementById('token-count');
        const status = document.getElementById('status');
        
        let conversationHistory = [];
        
        // Handle personality change
        personalitySelect.addEventListener('change', async () => {
            try {
                await fetch(`/personalities/${personalitySelect.value}`, { method: 'POST' });
                console.log('Personality changed to:', personalitySelect.value);
            } catch (e) {
                console.error('Failed to change personality:', e);
            }
        });
        
        // Auto-resize textarea
        messageInput.addEventListener('input', () => {
            messageInput.style.height = 'auto';
            messageInput.style.height = Math.min(messageInput.scrollHeight, 150) + 'px';
        });
        
        // Send on Enter (Shift+Enter for newline)
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        sendBtn.addEventListener('click', sendMessage);
        
        function addMessage(content, isUser) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user-message' : 'assistant-message'}`;
            
            const label = document.createElement('div');
            label.className = 'message-label';
            label.textContent = isUser ? 'You' : 'SloughGPT';
            
            const contentDiv = document.createElement('div');
            contentDiv.textContent = content;
            
            messageDiv.appendChild(label);
            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);
            
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            return contentDiv;
        }
        
        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant-message';
            typingDiv.id = 'typing-indicator';
            
            const label = document.createElement('div');
            label.className = 'message-label';
            label.textContent = 'SloughGPT';
            
            const dots = document.createElement('div');
            dots.className = 'typing';
            dots.innerHTML = '<span></span><span></span><span></span>';
            
            typingDiv.appendChild(label);
            typingDiv.appendChild(dots);
            chatContainer.appendChild(typingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        function hideTyping() {
            const typing = document.getElementById('typing-indicator');
            if (typing) typing.remove();
        }
        
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;
            
            // Add user message
            addMessage(message, true);
            messageInput.value = '';
            messageInput.style.height = 'auto';
            
            // Show typing
            const responseDiv = addMessage('', false);
            responseDiv.classList.add('typing-text');
            
            status.textContent = 'Generating...';
            sendBtn.disabled = true;
            
            try {
                // Call streaming API
                const response = await fetch('/infer/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        prompt: message,
                        max_length: 100,
                        temperature: 0.8,
                        model: modelSelect.value
                    })
                });
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let accumulated = '';
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const text = decoder.decode(value);
                    const lines = text.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                if (data.type === 'chunk') {
                                    accumulated = data.accumulated;
                                    responseDiv.textContent = accumulated;
                                    chatContainer.scrollTop = chatContainer.scrollHeight;
                                } else if (data.type === 'done') {
                                    tokenCount.textContent = `Tokens: ${accumulated.length}`;
                                }
                            } catch (e) {}
                        }
                    }
                }
                
            } catch (error) {
                responseDiv.textContent = `Error: ${error.message}`;
            }
            
            status.textContent = 'Ready';
            sendBtn.disabled = false;
        }
        
        // Check API health
        async function checkHealth() {
            try {
                const response = await fetch('/health');
                const data = await response.json();
                status.textContent = data.status === 'healthy' ? 'Ready' : 'Error';
            } catch {
                status.textContent = 'Disconnected';
            }
        }
        
        checkHealth();
        setInterval(checkHealth, 30000);
    </script>
</body>
</html>
