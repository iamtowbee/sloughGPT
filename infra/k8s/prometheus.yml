# Prometheus configuration for SloughGPT (docker-compose `monitoring` profile).
# TSDB path and retention are set via container flags in docker-compose.yml.

global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files: []

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: "sloughgpt-api"
    metrics_path: /metrics/prometheus
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets: ["api:8000"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: "system-metrics"
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets: ["node-exporter:9100"]

  # Enable when nvidia-exporter is on the compose network (see profile / services).
  # - job_name: "gpu-metrics"
  #   scrape_interval: 30s
  #   scrape_timeout: 10s
  #   static_configs:
  #     - targets: ["nvidia-exporter:9445"]
