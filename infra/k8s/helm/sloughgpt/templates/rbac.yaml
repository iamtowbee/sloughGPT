{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "sloughgpt.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sloughgpt.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
---
{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "sloughgpt.fullname" . }}-role
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sloughgpt.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets", "services"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "sloughgpt.fullname" . }}-rolebinding
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sloughgpt.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "sloughgpt.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "sloughgpt.fullname" . }}-role
  apiGroup: rbac.authorization.k8s.io
{{- end }}
