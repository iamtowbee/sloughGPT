apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sloughgpt-ingress
  namespace: sloughgpt
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/websocket-services: "sloughgpt-api"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$request_uri"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - sloughgpt.example.com
    secretName: sloughgpt-tls
  rules:
  - host: sloughgpt.example.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: sloughgpt-api
            port:
              number: 80
      - path: /ws
        pathType: Prefix
        backend:
          service:
            name: sloughgpt-api
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: sloughgpt-web
            port:
              number: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sloughgpt-model-ingress
  namespace: sloughgpt
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "1g"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - model.sloughgpt.example.com
    secretName: sloughgpt-model-tls
  rules:
  - host: model.sloughgpt.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: sloughgpt-model-server
            port:
              number: 80
