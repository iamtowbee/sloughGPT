apiVersion: v1
kind: ServiceAccount
metadata:
  name: sloughgpt-sa
  namespace: sloughgpt
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sloughgpt-role
  namespace: sloughgpt
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets", "services", "pods"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["autoscaling"]
  resources: ["horizontalpodautoscalers"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sloughgpt-rolebinding
  namespace: sloughgpt
subjects:
- kind: ServiceAccount
  name: sloughgpt-sa
  namespace: sloughgpt
roleRef:
  kind: Role
  name: sloughgpt-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sloughgpt-clusterrole
rules:
- apiGroups: [""]
  resources: ["nodes", "persistentvolumes"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["storage.k8s.io"]
  resources: ["storageclasses"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sloughgpt-clusterrolebinding
subjects:
- kind: ServiceAccount
  name: sloughgpt-sa
  namespace: sloughgpt
roleRef:
  kind: ClusterRole
  name: sloughgpt-clusterrole
  apiGroup: rbac.authorization.k8s.io
