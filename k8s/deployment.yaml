apiVersion: v1
kind: Namespace
metadata:
  name: sloughgpt
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sloughgpt-config
  namespace: sloughgpt
data:
  MODEL_PATH: "/app/models/sloughgpt.pt"
  DEVICE: "cuda"
  MAX_BATCH_SIZE: "32"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sloughgpt-api
  namespace: sloughgpt
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sloughgpt-api
  template:
    metadata:
      labels:
        app: sloughgpt-api
    spec:
      containers:
      - name: api
        image: sloughgpt/api:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: sloughgpt-config
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
            nvidia.com/gpu: 1
          limits:
            memory: "4Gi"
            cpu: "2000m"
            nvidia.com/gpu: 1
        volumeMounts:
        - name: model-storage
          mountPath: /app/models
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: model-storage
        persistentVolumeClaim:
          claimName: sloughgpt-models
---
apiVersion: v1
kind: Service
metadata:
  name: sloughgpt-api
  namespace: sloughgpt
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8000
  selector:
    app: sloughgpt-api
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sloughgpt-models
  namespace: sloughgpt
spec:
  accessModes:
    - ReadOnlyMany
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sloughgpt-model-server
  namespace: sloughgpt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sloughgpt-model-server
  template:
    metadata:
      labels:
        app: sloughgpt-model-server
    spec:
      containers:
      - name: model-server
        image: sloughgpt/model-server:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: sloughgpt-config
        resources:
          requests:
            memory: "4Gi"
            cpu: "2000m"
            nvidia.com/gpu: 1
          limits:
            memory: "8Gi"
            cpu: "4000m"
            nvidia.com/gpu: 1
        volumeMounts:
        - name: model-storage
          mountPath: /app/models
      volumes:
      - name: model-storage
        persistentVolumeClaim:
          claimName: sloughgpt-models
---
apiVersion: v1
kind: Service
metadata:
  name: sloughgpt-model-server
  namespace: sloughgpt
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8000
  selector:
    app: sloughgpt-model-server
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sloughgpt-api-hpa
  namespace: sloughgpt
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sloughgpt-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
