version: '3.8'

services:
  # API Server (CPU)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sloughgpt-api
    image: sloughgpt/api:latest
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./sloughgpt.db
      - SLAUGHGPT_ENV=production
      - SLAUGHGPT_LOG_LEVEL=INFO
      - SLAUGHGPT_HOST=0.0.0.0
      - SLAUGHGPT_PORT=8000
    volumes:
      - ./models:/app/models
      - ./datasets:/app/datasets
      - ./data:/app/data
      - ./vector_store:/app/vector_store
    environment:
      - VECTOR_STORE_PROVIDER=${VECTOR_STORE_PROVIDER:-in_memory}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-sentence_transformers}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      - PINECONE_API_KEY=${PINECONE_API_KEY:-}
      - WEAVIATE_URL=${WEAVIATE_URL:-http://weaviate:8080}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - sloughgpt-net

  # GPU version (NVIDIA CUDA)
  api-gpu:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    container_name: sloughgpt-api-gpu
    image: sloughgpt/api:gpu
    ports:
      - "8000:8000"
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - SLAUGHGPT_ENV=production
      - SLAUGHGPT_LOG_LEVEL=INFO
    volumes:
      - ./models:/app/models
      - ./datasets:/app/datasets
      - ./data:/app/data
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles:
      - gpu
    networks:
      - sloughgpt-net

  # Development mode with hot reload
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: sloughgpt-dev
    image: sloughgpt/dev:latest
    ports:
      - "8000:8000"
      - "5678:5678"  # Debugger
    environment:
      - SLAUGHGPT_ENV=development
      - SLAUGHGPT_LOG_LEVEL=DEBUG
      - DEBUG=true
    volumes:
      - ./:/app
      - /app/__pycache__  # Exclude cache
    command: uvicorn domains.ui.api_server:app --reload --host 0.0.0.0 --port 8000
    profiles:
      - dev
    networks:
      - sloughgpt-net

  # Model Server (lightweight inference)
  model-server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: sloughgpt-model
    image: sloughgpt/model:latest
    ports:
      - "8001:8000"
    environment:
      - MODEL_PATH=/app/models/sloughgpt.pt
      - DEVICE=cpu
    volumes:
      - ./models:/app/models
    restart: unless-stopped
    profiles:
      - model
    networks:
      - sloughgpt-net

  # Prometheus metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: sloughgpt-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    profiles:
      - monitoring
    networks:
      - sloughgpt-net

  # Grafana dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: sloughgpt-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    profiles:
      - monitoring
    networks:
      - sloughgpt-net

  # Redis cache
  redis:
    image: redis:7-alpine
    container_name: sloughgpt-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    profiles:
      - cache
    networks:
      - sloughgpt-net

  # ChromaDB Vector Store
  chromadb:
    image: ghcr.io/chroma-core/chroma:latest
    container_name: sloughgpt-chromadb
    ports:
      - "8002:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    volumes:
      - chromadb_data:/chroma/chroma
    profiles:
      - vector
    networks:
      - sloughgpt-net

  # Weaviate Vector Store
  weaviate:
    image: semitechnologies/weaviate:latest
    container_name: sloughgpt-weaviate
    ports:
      - "8080:8080"
    environment:
      - QUERY_MAXIMUM_RESULTS=100
      - AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED=true
      - PERSISTENCE_DATA_PATH=/var/lib/weaviate
      - ENABLE_MODULES=text2vec-transformers
      - TRANSFORMERS_INFERENCE_API=http://t2v-transformers:8080
    volumes:
      - weaviate_data:/var/lib/weaviate
    profiles:
      - vector
    networks:
      - sloughgpt-net

  # Web UI
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: sloughgpt-web
    image: sloughgpt/web:latest
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
      - NODE_ENV=production
    profiles:
      - web
    networks:
      - sloughgpt-net
    depends_on:
      - api

volumes:
  models:
  data:
  datasets:
  prometheus_data:
  grafana_data:
  redis_data:
  chromadb_data:
  weaviate_data:
  vector_store:

networks:
  sloughgpt-net:
    name: sloughgpt-network
    driver: bridge
