version: '3.8'

services:
  # API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sloughgpt-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./sloughgpt.db
      - SLAUGHGPT_ENV=production
      - SLAUGHGPT_LOG_LEVEL=INFO
    volumes:
      - ./models:/app/models
      - ./datasets:/app/datasets
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Web UI
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sloughgpt-web
    ports:
      - "3000:8000"
    environment:
      - SLAUGHGPT_ENV=production
    volumes:
      - ./domains/ui/web:/app/domains/ui/web
    restart: unless-stopped
    profiles:
      - web

  # Model Server (lightweight inference server)
  model-server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: sloughgpt-model
    ports:
      - "8001:8000"
    environment:
      - MODEL_PATH=/app/models/sloughgpt.pt
      - DEVICE=cpu
    volumes:
      - ./models:/app/models
    restart: unless-stopped

  # GPU version (enable with: docker-compose --profile gpu up)
  api-gpu:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sloughgpt-api-gpu
    ports:
      - "8001:8000"
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - SLAUGHGPT_ENV=production
    volumes:
      - ./models:/app/models
      - ./datasets:/app/datasets
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles:
      - gpu

  # Development
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sloughgpt-dev
    ports:
      - "8000:8000"
      - "5678:5678"
    environment:
      - SLAUGHGPT_ENV=development
      - SLAUGHGPT_LOG_LEVEL=DEBUG
    volumes:
      - ./:/app
    command: uvicorn domains.ui.api_server:app --reload --host 0.0.0.0 --port 8000
    profiles:
      - dev

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: sloughgpt-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    profiles:
      - monitoring

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: sloughgpt-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    profiles:
      - monitoring

volumes:
  models:
  data:
  datasets:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: sloughgpt-network
