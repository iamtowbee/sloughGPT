[project]
name = "sloughgpt"
version = "1.0.0"
description = "Enterprise AI Framework with domain-based architecture"
requires-python = ">=3.8"

[tool.setuptools.packages.find]
where = ["."]
include = ["domains*", "server*", "sloughgpt*", "features*", "tuning*", "wrapper*"]
exclude = ["tests*", "web*", "k8s*", "docker*", "models*", "grafana*", "archive*", "experiments*"]

[tool.ruff]
line-length = 100
target-version = "py38"

[tool.ruff.lint]
select = ["E", "F", "W"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
